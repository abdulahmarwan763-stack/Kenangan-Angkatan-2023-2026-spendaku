<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenangan Kelas 9A</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .pesan-card { border-bottom: 1px solid #ddd; padding: 10px 0; }
        textarea { width: 100%; height: 80px; margin: 10px 0; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Buku Kenangan Digital 9A 🎓</h1>

    <div id="login-section">
        <p>Silakan login untuk meninggalkan pesan kenangan.</p>
        <button id="btn-login">Login dengan Google</button>
    </div>

    <div id="app-section" style="display:none;">
        <p>Halo, <b id="user-name"></b>! Bagikan kenanganmu di bawah ini:</p>
        <textarea id="input-pesan" placeholder="Tulis sesuatu untuk teman-teman..."></textarea>
        <br>
        <button id="btn-kirim">Kirim Pesan</button>
        <hr>
        <h3>Pesan dari Teman-teman:</h3>
        <div id="container-pesan"></div>
    </div>

    <script type="module">
        // 1. IMPORT SDK FIREBASE TERBARU
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        // 2. CONFIG MILIKMU (Tempel di sini)
        const firebaseConfig = {
            apiKey: "AIzaSyCC9rUv6XU4pwXjOmN3assozfMS9Lxpcdc",
            authDomain: "kenangan-9a.firebaseapp.com",
            projectId: "kenangan-9a",
            storageBucket: "kenangan-9a.firebasestorage.app",
            messagingSenderId: "659527903226",
            appId: "1:659527903226:web:d7b34b838640fb9012a643",
            measurementId: "G-4VTDZECJD9"
        };

        // 3. INISIALISASI
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // ELEMENT HTML
        const loginSection = document.getElementById('login-section');
        const appSection = document.getElementById('app-section');
        const btnLogin = document.getElementById('btn-login');
        const btnKirim = document.getElementById('btn-kirim');

        // FUNGSI LOGIN
        btnLogin.onclick = () => signInWithPopup(auth, provider);

        // PANTAU STATUS LOGIN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.style.display = 'none';
                appSection.style.display = 'block';
                document.getElementById('user-name').innerText = user.displayName;
                muatPesan();
            }
        });

        // SIMPAN PESAN KE DATABASE
        btnKirim.onclick = () => {
            const teks = document.getElementById('input-pesan').value;
            if(teks.trim() !== "") {
                push(ref(db, 'kenangan/'), {
                    nama: auth.currentUser.displayName,
                    isi: teks,
                    waktu: Date.now()
                });
                document.getElementById('input-pesan').value = "";
            }
        };

        // AMBIL PESAN SECARA REALTIME
        function muatPesan() {
            onValue(ref(db, 'kenangan/'), (snapshot) => {
                const container = document.getElementById('container-pesan');
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    container.innerHTML += `
                        <div class="pesan-card">
                            <b>${data.nama}</b>: <br>
                            ${data.isi}
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
